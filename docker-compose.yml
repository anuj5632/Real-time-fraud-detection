services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: fraud-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: fraud-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://host.docker.internal:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  ml-service-api:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: fraud-ml-api
    ports:
      - "8000:8000"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_INPUT_TOPIC=transaction-events
      - KAFKA_OUTPUT_TOPIC=fraud-results
      - MLFLOW_ENABLED=false
    depends_on:
      - kafka

  ml-service-consumer:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: fraud-ml-consumer
    command: ["python", "-m", "app.kafka.consumer"]
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_INPUT_TOPIC=transaction-events
      - KAFKA_OUTPUT_TOPIC=fraud-results
      - MLFLOW_ENABLED=false
    depends_on:
      - kafka

  rag-service:
    build:
      context: ./rag-service
      dockerfile: Dockerfile
    container_name: fraud-rag-service
    ports:
      - "8001:8001"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC=fraud-results
    depends_on:
      - kafka
